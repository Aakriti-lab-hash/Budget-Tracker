<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Profile</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: white;
      padding: 2rem;
      box-shadow: 2px 0 5px rgba(0,0,0,0.05);
    }

    .sidebar h2 {
      margin-bottom: 2rem;
      font-size: 1.5rem;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar li {
      padding: 10px 0;
      color: #333;
      cursor: pointer;
    }

   .sidebar li.active {
      font-weight: bold;
      color: #007bff;
    }

    .main-content {
      flex-grow: 1;
      padding: 2rem;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      
      align-items: center;
    }
    .button-group{
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .saving {
      color: green;
      font-size: 0.5rem;
    }
    #saveBtn:disabled {
      background-color: #bdbdbd;  /* Grey background */
  color: white;               /* Text color */
  border: none;               /* No border */
  cursor: not-allowed;        /* Cursor shows it's disabled */
  opacity: 0.7;   /* Slight transparency */
  padding: 6px 12px;
  border-radius: 4px;
   font-weight: bold;
  font-size: 16px;
}
     #saveBtn {
  background-color:  #e298c1; /* pink when active */
  color: #000;
  border: none;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 4px;
  font-weight: bold;
  font-size: 16px;
}
   #saveBtn:hover{
     background-color: #c98db2;

   }
   #editBtn{
     padding: 6px 12px;
      font-size: 16px;
      font-weight: bold;
      background-color: #e298c1;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;

   }
   #editBtn:hover{
     background-color: #c98db2;

   }
   

    .back-button {
      padding: 6px 12px;
      font-size: 16px;
      font-weight: bold;
      background-color: #e298c1;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .back-button:hover {
      background-color: #c98db2;
    }


    .profile-section {
      margin-top: 2rem;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    
    .form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form label {
      grid-column: span 2;
      font-weight: bold;
    }

    .form input,
    .form select {
      padding: 10px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    .form input[disabled],
    .form select[disabled] {
      background-color: #f0f0f0;
    }

    .phone-field {
      display: flex;
      gap: 0.5rem;
    }

    .phone-field select {
      flex: 1;
    }

    .phone-field input {
      flex: 3;
    }

    .delete-account {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
    }

    .delete-account p {
      font-size: 0.9rem;
      color: #555;
    }

    .delete-btn {
      margin-top: 0.5rem;
      padding: 10px 20px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>ProAcc (<span id="user-initial">U</span>)</h2>
      <nav>
        <ul>
          <li class="active">Personal Info</li>
         
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <div class="header">
        <h2>Personal Information</h2>
        <div class="button-group">
         <a href="home.html">
      <button class="back-button">Back</button>

    </a>
    <button type="button" id="editBtn">Edit</button>
        <button id="saveBtn" disabled>Save Changes</button>
        <p class="saving" style="display:none;">Saving changes...</p>
       </div>
      </div>

      <div class="profile-section">
        
        <div class="form">
          <label>First Name</label>
          <input type="text" id="firstName" disabled />

          <label>Last Name</label>
          <input type="text" id="lastName" disabled />

          <label>Email Address</label>
          <input type="email" id="email" disabled />

          <label>Phone Number</label>
          <div class="phone-field">
            <select id="phoneCode" disabled>
              <option value="+880">+880</option>
              <option value="+91">+91</option>
            </select>
            <input type="text" id="phoneNumber" disabled />
          </div>

          <label>Country</label>
          <select id="country" disabled>
            <option value="Bangladesh">Bangladesh</option>
            <option value="India">India</option>
          </select>

          <label>City</label>
          <select id="city" disabled>
            <option value="Sylhet">Sylhet</option>
            <option value="Dhaka">Dhaka</option>
            <option value="Arrah">Arrah</option>
          </select>

          
        </div>

        <div class="delete-account">
          <h3>Delete Account</h3>
          <p>After making a deletion request, you will have <strong>6 months</strong> to maintain this account.</p>
          <button class="delete-btn">Delete Account</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const firebaseConfig = {
    apiKey: "AIzaSyCGHy6dFx659oXQF_UtRxGhcLV4pie461I",
    authDomain: "budget-tracker-41390.firebaseapp.com",
    projectId: "budget-tracker-41390",
    storageBucket: "budget-tracker-41390.firebasestorage.app",
    messagingSenderId: "10009807468",
    appId: "1:10009807468:web:a4c81c9881b1c006496649"
  };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    firebase.auth().onAuthStateChanged(async function(user) {
      if (user) {
        console.log("User logged in: ", user.uid);

        // Show initial
        
        // Load user data
        try {
          const doc = await db.collection("users").doc(user.uid).get();
          if (doc.exists) {
            const data = doc.data();
            console.log(data.firstName);
            document.getElementById("user-initial").textContent = (user.displayName || user.email[0]).toUpperCase();

            document.getElementById("firstName").value = data.firstName || "";
            document.getElementById("lastName").value = data.lastName || "";
            document.getElementById("email").value = user.email || "";
            const phoneParts = (data.phone || "").split(" ");
            document.getElementById("phoneCode").value = phoneParts[0] || "+880";
            document.getElementById("phoneNumber").value = phoneParts[1] || "";
            document.getElementById("country").value = data.country || "Bangladesh";
            document.getElementById("city").value = data.city || "Sylhet";
          }
        } catch (err) {
          console.error("Error loading user data: ", err);
        }
      } else {
        alert("User not logged in. Please login first.");
        window.location.href = "login.html";
      }
    });

    document.getElementById("editBtn").addEventListener("click", () => {
      const inputs = document.querySelectorAll(".form input, .form select");

     inputs.forEach(input => {
    // ❌ Don't enable firstName and email
    if (input.id !== "firstName" && input.id !== "email") {
      input.disabled = false;
    }
  });

  document.getElementById("saveBtn").disabled = false;
});

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const savingText = document.querySelector(".saving");
      savingText.style.display = "block";
      savingText.textContent = "Saving changes...";
      savingText.style.color = "orange";

      const user = firebase.auth().currentUser;
      if (!user) {
        alert("User not logged in.");
        return;
      }

      const userData = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phoneCode").value + " " + document.getElementById("phoneNumber").value,
        country: document.getElementById("country").value,
        city: document.getElementById("city").value,
        updatedAt: new Date()
      };

      try {
        await db.collection("users").doc(user.uid).set(userData, { merge: true });
        savingText.textContent = "Changes saved ✔";
        savingText.style.color = "green";

        setTimeout(() => {
          window.location.href = "home.html";
        }, 1500);
      } catch (error) {
        console.error("Error saving data: ", error);
        savingText.textContent = "Failed to save changes.";
        savingText.style.color = "red";
      }
    });

    document.querySelector('.delete-btn').addEventListener('click', () => {
      const confirmDelete = confirm('Are you sure you want to delete your account? This action cannot be undone!');
      if (confirmDelete) {
        alert('Account deletion request submitted. You have 6 months to recover it.');
        // Add delete account logic if needed
      }
    });
  </script>
  
</body>
</html>
