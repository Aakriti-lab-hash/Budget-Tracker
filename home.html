<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Tracker</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="firebase-config.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('money.jpg') no-repeat center center fixed;
      background-size: cover;
      color: rgb(102, 100, 112);
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(#0f172a, #0f2257);
      padding: 20px 30px;
    }

    .title {
      font-size: 1.5em;
      font-weight: bold;
      color: white;
    }

    #welcomeMessage {
      color: rgb(226, 73, 145);
      font-size: 20px;
      margin-top: 5px;
      font-weight: bold;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .search-box input {
      padding: 8px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
    }

    .user-info-container {
      position: relative;
    }

  .avatar-circle {
  background-color: #f1f1f1;
  color: #000;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 18px;
}


    .dropdown {
      display: flex;
      position: absolute;
      right: 0;
      top: 68px;
      gap:1px;
      margin-right: 0.8rem;
      width:220;
      background: white;
      border: 1px solid #ccc;
      border-radius:10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      z-index: 100;
      flex-direction: column;
    }

    .dropdown button {
      display:flex;
      padding: 10px 30px;
      border: none;
      background: none;
      text-align: left;
      font-size: 16px;
      cursor: pointer;
      width: 150%;
    }
    .dropdown a i{
      margin-right:0.4rem;
      font-size:1.1rem;
      width:1.5rem;
      height:1.5rem;
      background-color: #0f172a, #0f2257;
     /* color:white;*/
      border-radius: 50%;

    }

    .dropdown button:hover {
      
      background-color: #f0f0f0;
      box-shadow:#444
    }
    .dropdown-img i{
    position: absolute;
    right: 0;
    bottom: 0.3rem;
    
    font-size: 0.5rem;
    color: var(--secondary);
}

    .overlay-text {
      position:absolute;
      top:50%;
     left:50%;
      color:rgb(102, 100, 112);
      font-size:60px;
     text-align:center;
    }

    .start-button {
      padding: 12px 30px;
      font-size: 20px;
      font-weight: bold;
      background-color: #e298c1;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .start-button:hover {
      background-color: #c98db2;
    }

    
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      
      .nav-left {
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
      }}
      
 .search-box {
  position: relative;
}

.search-box input {
  padding: 8px 40px 8px 12px;
  border-radius: 5px;
  border: none;
  font-size: 16px;
  width: 150px;
}

.search-box button {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: none;
  cursor: pointer;
  color: #444;
  font-size: 16px;
}

.search-box button:hover {
  color: #ffd700;
}

/* Style the result box */
#searchResults {
  display: none;
  position: absolute;
  top: 100%; /* just below the input */
  left: 0;
  right: 0;
  z-index: 999;
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 10px;
  max-height: 250px;
  overflow-y: auto;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}


      .overlay-text {
        font-size: 40px;
        font-weight: bold;
      }

      .title {
        font-size: 2em;
      }
    
  </style>
</head>
<body>

  <div class="navbar">
    <div class="tracker-container">
      <h1 class="title">BUDGET TRACKER</h1>
      <p id="welcomeMessage"></p>
    </div>

    <div class="nav-left">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search...">
         <button id="searchBtn"><i class="fas fa-search"></i></button>
         <div id="searchResults"></div>
      </div>
     

           <!-- <div class="nav-left">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search...">
                <i class="fas fa-search"></i>
            </div> -->


      <div class="user-info-container">
        <div id="userAvatar" class="avatar-circle">U</div>

        <div class="dropdown" id="userDropdown">
          <a href="profile.html">
           
            <button id="profileBtn"> <i class="fa-regular fa-user"></i> My Info</button>
          </a>
          <a href="index.html">
            
            <button id="logoutBtn"> <i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</button>
          </a>
         

        </div>
      </div>
    </div>
  </div>
   </div>

  <div class="overlay-text">
    <p>Start Saving Today for a Better Tomorrow!</p>
    <a href="dashboard.html">
      <button class="start-button">Start</button>
    </a>
  </div>

 <script type="module">
  import { auth, db } from "./firebase-config.js";
  import {
    doc,
    getDoc,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

  import {
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

  const avatar = document.getElementById("userAvatar");
  const dropdown = document.getElementById("userDropdown");
  const welcomeMessage = document.getElementById("welcomeMessage");
  const logoutBtn = document.getElementById("logoutBtn");
  const profileBtn = document.getElementById("profileBtn");

  const searchInput = document.getElementById("searchInput");
  const resultsBox = document.getElementById("searchResults");

  // Toggle dropdown
  avatar.addEventListener("click", () => {
    dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
  });

  // Handle outside click to hide dropdown
  document.addEventListener("click", function (event) {
    if (!avatar.contains(event.target) && !dropdown.contains(event.target)) {
      dropdown.style.display = "none";
    }
  });

  // Logout
  logoutBtn.addEventListener("click", () => {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  });

  // Go to profile
  profileBtn.addEventListener("click", () => {
    window.location.href = "profile.html";
  });

  // Auth change
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userRef = doc(db, "users", user.uid);
      const docSnap = await getDoc(userRef);

      let initial = user.email.charAt(0).toUpperCase();
      let nameToShow = user.email;

      if (docSnap.exists()) {
        const data = docSnap.data();
        if (data.firstName) {
          initial = data.firstName.charAt(0).toUpperCase();
          nameToShow = data.firstName;
        }
      }

      avatar.textContent = initial;
      welcomeMessage.textContent = `Welcome, ${nameToShow}!`;
    } else {
      window.location.href = "index.html";
    }
  });

  // ✅ SEARCH FUNCTIONALITY FROM FIREBASE
  searchInput.addEventListener("input", async () => {
    const query = searchInput.value.trim().toLowerCase();

    if (!query) {
      resultsBox.style.display = "none";
      resultsBox.innerHTML = "";
      return;
    }

    const user = auth.currentUser;
    if (!user) {
      resultsBox.style.display = "block";
      resultsBox.innerHTML = "<p>Please log in to search.</p>";
      return;
    }

    try {
      const expenseRef = doc(db, "users", user.uid, "data", "expenses");
      const docSnap = await getDoc(expenseRef);

      let expenses = [];
      if (docSnap.exists()) {
        expenses = docSnap.data().expenses || [];
      }

      const filtered = expenses
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .filter(exp =>
          exp.category?.toLowerCase().includes(query) ||
          exp.date?.toLowerCase().includes(query) ||
          exp.amount?.toString().includes(query)
        );

      if (filtered.length > 0) {
        resultsBox.style.display = "block";
        resultsBox.innerHTML = filtered.map(exp => `
          <div style="border-bottom: 1px solid #ccc; padding: 8px;">
            <strong>Category:</strong> ${exp.category || 'N/A'}<br>
            <strong>Amount:</strong> ₹${exp.amount || '0'}<br>
            <strong>Date:</strong> ${exp.date || 'N/A'}
          </div>
        `).join("");
      } else {
        resultsBox.style.display = "block";
        resultsBox.innerHTML = "<p>No matching results.</p>";
      }

    } catch (err) {
      console.error("Error fetching expenses:", err);
      resultsBox.innerHTML = "<p>Error loading data.</p>";
    }
  });
</script>

</body>
</html>
